<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Support Us - AniShift</title>
    <script src="theme.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-main: #000000;
            --accent-color: #1e90ff;
            --text-light: #ffffff;
            --text-muted: #9499a1;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent !important;
            box-shadow: none !important;
            outline: none !important;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-light);
            height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem;
            text-align: center;
            overflow: hidden;
            flex-direction: column;
        }

        .container {
            max-width: 420px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
        }

        .logo-box img {
            max-width: 250px;
            height: auto;
        }

        .message {
            font-size: 0.95rem;
            font-weight: 600;
            line-height: 1.6;
            color: #d1d5db;
        }

        .btn-continue {
            width: 100%;
            padding: 1.2rem;
            background: #1a1b26;
            color: var(--text-muted);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 3rem;
            font-size: 1rem;
            font-weight: 900;
            cursor: not-allowed;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-continue.active {
            background: var(--accent-color);
            color: #000;
            cursor: pointer;
            border-color: var(--accent-color);
        }

        #ad-status {
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05rem;
            color: var(--text-muted);
            height: 20px;
        }

        .loader-dots {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
        }
        .dot {
            width: 8px;
            height: 8px;
            background: var(--accent-color);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="logo-box">
            <img src="images/logo_full.png" alt="AniShift">
        </div>

        <p class="message">
            To keep providing free streaming, we rely on minimal ad support. Please wait a moment.
        </p>

        <div id="ad-status">
            <div class="loader-dots" id="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
            <span id="status-text">Initializing Ads...</span>
        </div>

        <button id="main-btn" class="btn-continue" onclick="handleClick()">Please Wait 5s...</button>
    </div>

    <!-- Ad Tag -->
    <script src="https://quge5.com/88/tag.min.js" data-zone="223477" async data-cfasync="false"></script>

    <script>
        let timeLeft = 5;
        const btn = document.getElementById('main-btn');
        const statusText = document.getElementById('status-text');
        const dots = document.getElementById('dots');
        
        // IMPORTANT: We use a specific visit-level flag to handle reloads
        // If we just clicked the ad, we should be in 'verified' mode
        const isVerified = sessionStorage.getItem('anishift_temp_verified') === 'true';

        if (isVerified) {
            enableFinalStep();
        } else {
            startTimer();
        }

        function startTimer() {
            const timer = setInterval(() => {
                timeLeft--;
                btn.textContent = `Please Wait ${timeLeft}s...`;
                
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    enableAdStep();
                }
            }, 1000);
        }

        function enableAdStep() {
            btn.textContent = "Continue (Support Us)";
            btn.classList.add('active');
            btn.style.cursor = 'pointer';
            statusText.textContent = "Ready! Click to Open Support Ad";
            statusText.style.color = "#2ed573";
            dots.style.display = 'none';
        }

        function enableFinalStep() {
            btn.classList.add('active');
            btn.style.cursor = 'pointer';
            btn.textContent = "Enter AniShift Now";
            statusText.textContent = "Ad Verified! Thank you";
            statusText.style.color = "#2ed573";
            dots.style.display = 'none';
            // Clear the temp flag if we are here
        }

        function handleClick() {
            if (!btn.classList.contains('active')) return;

            if (sessionStorage.getItem('anishift_temp_verified') === 'true') {
                // Final Step: Go back to app
                sessionStorage.removeItem('anishift_temp_verified');
                const urlParams = new URLSearchParams(window.location.search);
                const redirect = urlParams.get('redirect') || 'anishift.app/home.html';
                window.location.href = decodeURIComponent(redirect);
            } else {
                // Ad Step: Open ad and set flag
                sessionStorage.setItem('anishift_temp_verified', 'true');
                
                // Open the ad
                window.open('https://omg10.com/4/10787829', '_blank');
                
                // Reload to show the 'Enter' button
                setTimeout(() => {
                    window.location.reload();
                }, 500);
            }
        }

        // Back button lock
        history.pushState(null, null, location.href);
        window.onpopstate = function () {
            history.go(1);
        };
    </script>
</body>

</html>
