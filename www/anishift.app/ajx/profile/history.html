<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Watch History - AniShift</title>
    <script src="../../../theme.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-main: #0a0b10;
            --bg-card: #11121a;
            --accent-color: #1e90ff;
            --text-light: #ffffff;
            --text-muted: #9ca3af;
            --glass-border: rgba(255, 255, 255, 0.08);
            --nav-bg: rgba(10, 11, 16, 0.85);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-light);
            min-height: 100dvh;
            display: block;
            transition: background 0.4s ease;
        }

        /* Navbar */
        .navbar {
            position: sticky;
            top: 0;
            width: 100%;
            padding: 1.25rem;
            padding-top: calc(1.25rem + env(safe-area-inset-top));
            background: var(--nav-bg);
            backdrop-filter: blur(20px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--glass-border);
        }

        html.light-theme .navbar {
            background: rgba(255, 255, 255, 0.85);
        }

        .nav-left {
            display: flex;
            align-items: center;
        }

        .nav-back {
            width: 2.5rem;
            height: 2.5rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-light);
            text-decoration: none;
            font-size: 1.1rem;
            margin-right: 1.25rem;
        }

        .nav-title {
            font-size: 1.1rem;
            font-weight: 900;
            letter-spacing: -0.02rem;
        }

        .clear-btn {
            background: rgba(255, 50, 50, 0.1);
            color: #ff4757;
            border: none;
            padding: 0.6rem 1rem;
            border-radius: 2rem;
            font-size: 0.75rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
        }

        .container {
            padding: 1.5rem;
            max-width: 700px;
            margin: 0 auto;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .history-item {
            background: var(--bg-secondary);
            border-radius: 1.25rem;
            padding: 0.75rem;
            display: flex;
            gap: 1rem;
            text-decoration: none;
            color: var(--text-light);
            border: 1px solid var(--glass-border);
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        .history-item:active {
            transform: scale(0.98);
        }

        .history-img-wrap {
            width: 6rem;
            height: 8.5rem;
            border-radius: 0.75rem;
            overflow: hidden;
            flex-shrink: 0;
            position: relative;
        }

        .history-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .play-icon {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: 0.3s;
        }

        .history-item:hover .play-icon {
            opacity: 1;
        }

        .play-icon i {
            width: 2.5rem;
            height: 2.5rem;
            background: var(--accent-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-size: 1rem;
        }

        .history-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-width: 0;
            padding-right: 1.5rem;
        }

        .history-title {
            font-size: 0.95rem;
            font-weight: 800;
            margin-bottom: 0.4rem;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .history-meta {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 700;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .history-meta i {
            color: var(--accent-color);
            font-size: 0.6rem;
        }

        .progress-section {
            width: 100%;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.08);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 0.4rem;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent-color);
            border-radius: 10px;
        }

        .progress-text {
            font-size: 0.65rem;
            font-weight: 800;
            color: var(--accent-color);
            text-transform: uppercase;
        }

        .remove-single {
            position: absolute;
            top: 0.75rem;
            right: 1.25rem;
            color: var(--text-muted);
            font-size: 1.2rem;
            width: 2.5rem;
            height: 2.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(255,255,255,0.03);
            z-index: 5;
        }

        /* Empty State */
        .empty-state {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 5rem 2rem;
            text-align: center;
            animation: fadeIn 0.5s ease-out;
        }

        .empty-icon {
            font-size: 4rem;
            color: var(--text-muted);
            opacity: 0.2;
            margin-bottom: 1.5rem;
        }

        .empty-text {
            font-size: 1.1rem;
            font-weight: 900;
            margin-bottom: 0.5rem;
        }

        .empty-p {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 600;
            line-height: 1.5;
            max-width: 250px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>
    <div class="navbar">
        <div class="nav-left">
            <a href="../../home.html#profile" class="nav-back">
                <i class="fa-solid fa-angle-left"></i>
            </a>
            <span class="nav-title">Watch History</span>
        </div>
        <button class="clear-btn" onclick="confirmClear()">
            <i class="fa-solid fa-trash-can"></i> Clear
        </button>
    </div>

    <div class="container">
        <div id="historyList" class="history-list">
            <!-- Render via JS -->
        </div>

        <div id="emptyState" class="empty-state">
            <div class="empty-icon"><i class="fa-solid fa-clock-rotate-left"></i></div>
            <h2 class="empty-text">No History Yet</h2>
            <p class="empty-p">Your recently watched anime will appear here. Start watching now!</p>
        </div>
    </div>

    <script>
        function loadHistory() {
            const list = JSON.parse(localStorage.getItem('continueWatching') || '[]');
            const container = document.getElementById('historyList');
            const empty = document.getElementById('emptyState');

            if (list.length === 0) {
                container.style.display = 'none';
                empty.style.display = 'flex';
                document.querySelector('.clear-btn').style.display = 'none';
                return;
            }

            container.style.display = 'flex';
            empty.style.display = 'none';
            document.querySelector('.clear-btn').style.display = 'flex';

            container.innerHTML = list.map((item, idx) => `
                <div style="position: relative;">
                    <a href="../c.w.d/watch.html?id=${item.id}&ep=${item.ep}" class="history-item">
                        <div class="history-img-wrap">
                            <img src="${item.img}" class="history-img" alt="">
                            <div class="play-icon"><i class="fa-solid fa-play"></i></div>
                        </div>
                        <div class="history-info">
                            <h2 class="history-title">${item.title}</h2>
                            <div class="history-meta">
                                <span>EPISODE ${item.ep}</span>
                                <i class="fa-solid fa-circle"></i>
                                <span>Official Stream</span>
                            </div>
                            <div class="progress-section">
                                <div class="progress-bar">
                                    <div class="progress-fill" style="width: 45%"></div>
                                </div>
                                <span class="progress-text">45% Completed</span>
                            </div>
                        </div>
                    </a>
                    <div class="remove-single" onclick="removeItem(${idx}, event)">
                         <i class="fa-solid fa-xmark"></i>
                    </div>
                </div>
            `).join('');
        }

        function removeItem(index, e) {
            e.preventDefault();
            e.stopPropagation();
            let list = JSON.parse(localStorage.getItem('continueWatching') || '[]');
            list.splice(index, 1);
            localStorage.setItem('continueWatching', JSON.stringify(list));
            loadHistory();
        }

        function confirmClear() {
            if (confirm("Are you sure you want to clear your entire watch history?")) {
                localStorage.removeItem('continueWatching');
                loadHistory();
            }
        }

        document.addEventListener('DOMContentLoaded', loadHistory);
    </script>
</body>

</html>
