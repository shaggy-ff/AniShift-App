<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pricing Plan - AniShift Premium</title>
    
    <script src="../../../theme.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #121212;
            --accent-purple: #7d5fff;
            --accent-glow: rgba(125, 95, 255, 0.4);
            --card-dark: #1e1e1e;
            --text-light: #ffffff;
            --text-muted: #a0a0a0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Top Wavy Header */
        .top-blob {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 180px;
            background: linear-gradient(135deg, #7d5fff 0%, #4b34b1 100%);
            border-bottom-left-radius: 50% 30px;
            border-bottom-right-radius: 50% 30px;
            z-index: -1;
        }

        /* Custom Wave using SVG overlay if needed, but CSS radius is simpler for mobile */

        .header {
            padding: 2rem 1.5rem;
            padding-top: calc(2rem + env(safe-area-inset-top));
            display: flex;
            align-items: center;
        }

        .back-btn {
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            text-decoration: none;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .back-btn:active { transform: scale(0.85); background: rgba(255, 255, 255, 0.1); }

        .container {
            flex: 1;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            margin-top: 1rem;
        }

        .hero-title {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.75rem;
            letter-spacing: -0.5px;
        }

        .hero-sub {
            font-size: 1rem;
            color: var(--text-muted);
            max-width: 300px;
            line-height: 1.5;
            margin-bottom: 3rem;
        }

        /* Selection List */
        .plan-list {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            margin-bottom: 4rem;
        }

        .plan-item {
            width: 100%;
            background: var(--card-dark);
            border-radius: 20px;
            padding: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 2px solid transparent;
            transition: 0.3s;
            position: relative;
        }

        .plan-item.active {
            background: var(--accent-purple);
            border-color: var(--accent-purple);
        }

        .item-left {
            text-align: left;
        }

        .item-title {
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 0.3rem;
        }

        .item-sub {
            font-size: 0.85rem;
            opacity: 0.7;
        }

        .item-right {
            display: flex;
            align-items: center;
            gap: 2px;
        }

        .price-symbol {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .price-val {
            font-size: 2.5rem;
            font-weight: 900;
        }

        .price-term {
            font-size: 0.85rem;
            opacity: 0.8;
            margin-top: 10px;
        }

        .badge-save {
            position: absolute;
            top: -12px;
            right: 20px;
            background: #fff;
            color: var(--accent-purple);
            padding: 0.3rem 0.8rem;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 900;
        }

        /* Footer Button */
        .footer-actions {
            position: sticky;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 2rem 1.5rem;
            padding-bottom: calc(2.5rem + env(safe-area-inset-bottom));
            background: linear-gradient(to top, var(--bg-dark) 70%, transparent 100%);
        }

        .btn-continue {
            width: 100%;
            height: 64px;
            background: var(--accent-purple);
            color: #fff;
            border: none;
            border-radius: 18px;
            font-size: 1.15rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            transition: 0.2s;
        }

        .btn-continue:active { transform: scale(0.97); }

        .btn-continue i {
            font-size: 1.3rem;
        }

        /* Responsive */
        @media (max-width: 360px) {
            .hero-title { font-size: 2rem; }
            .price-val { font-size: 2rem; }
        }
    </style>
</head>

<body>
    <div class="top-blob"></div>

    <header class="header">
        <a href="../../home.html" class="back-btn">
            <i class="fa-solid fa-arrow-left-long"></i>
        </a>
    </header>

    <div class="container">
        <h1 class="hero-title">Pricing Plan</h1>
        <p class="hero-sub">Choose a subscription plan to unlock all the functionality of the application</p>

        <div class="plan-list">
            <!-- The Only Selected Plan -->
            <div class="plan-item active">
                <span class="badge-save">LKR 300.00 Only</span>
                <div class="item-left">
                    <p class="item-title">Supreme Member</p>
                    <p class="item-sub">1 Month Unlimited Plan</p>
                </div>
                <div class="item-right">
                    <span class="price-symbol">$</span>
                    <span class="price-val">1</span>
                    <span class="price-term">/mo</span>
                </div>
            </div>
        </div>
    </div>

    <div class="footer-actions">
        <button class="btn-continue" onclick="startCheckout()">
            Continue <i class="fa-solid fa-chevron-right"></i>
        </button>
    </div>

    <script>
        function startCheckout() {
            window.location.href = 'payment.html';
        }

        // Apply theme color
        document.addEventListener('DOMContentLoaded', () => {
            if (window.AniShiftTheme) {
                const color = window.AniShiftTheme.getColor();
                document.documentElement.style.setProperty('--accent-purple', color);
                document.documentElement.style.setProperty('--accent-glow', color + '60');
                
                // Update top blob gradient
                const blob = document.querySelector('.top-blob');
                blob.style.background = `linear-gradient(135deg, ${color} 0%, #1e1e2e 100%)`;
            }
        });

        // Capacitor Back Button
        document.addEventListener('DOMContentLoaded', () => {
            if (window.Capacitor && window.Capacitor.Plugins.App) {
                const App = window.Capacitor.Plugins.App;
                App.addListener('backButton', ({ canGoBack }) => {
                    if (canGoBack) window.history.back();
                    else App.exitApp();
                });
            }
        });
    </script>
</body>

</html>
