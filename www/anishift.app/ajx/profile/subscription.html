<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pricing Plan - AniShift Premium</title>
    
    <script src="../../../theme.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #121212;
            --accent-purple: #7d5fff;
            --accent-glow: rgba(125, 95, 255, 0.4);
            --card-dark: #1e1e1e;
            --text-light: #ffffff;
            --text-muted: #a0a0a0;
            --glass-border: rgba(255, 255, 255, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Fluid Blob Header */
        .top-blob {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 220px;
            background: linear-gradient(135deg, #7d5fff 0%, #4b34b1 100%);
            border-bottom-left-radius: 50% 40px;
            border-bottom-right-radius: 50% 40px;
            z-index: -1;
        }

        .header {
            padding: 2.5rem 1.5rem;
            padding-top: calc(2.5rem + env(safe-area-inset-top));
            display: flex;
            align-items: center;
        }

        .back-btn {
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            text-decoration: none;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .back-btn:active { transform: scale(0.85); background: rgba(255, 255, 255, 0.1); }

        .container {
            flex: 1;
            padding: 1.5rem;
            padding-top: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .hero-title {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
        }

        .hero-sub {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.7);
            max-width: 280px;
            line-height: 1.4;
            margin-bottom: 2.5rem;
        }

        /* Plan List */
        .plan-list {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            margin-bottom: 2rem;
        }

        .plan-item {
            width: 100%;
            background: var(--card-dark);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: left;
            cursor: pointer;
        }

        .plan-item.active {
            background: var(--accent-purple);
            border-color: var(--accent-purple);
        }

        .item-left {
            flex: 1;
        }

        .item-title {
            font-size: 1.15rem;
            font-weight: 800;
            margin-bottom: 4px;
        }

        .item-sub {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .plan-item.active .item-sub {
            color: rgba(255, 255, 255, 0.8);
        }

        .item-right {
            text-align: right;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .price-val {
            font-size: 1.4rem;
            font-weight: 900;
        }

        .price-term {
            font-size: 0.75rem;
            font-weight: 600;
            opacity: 0.7;
        }

        .badge-save {
            position: absolute;
            top: -12px;
            right: 20px;
            background: #fff;
            color: var(--accent-purple);
            padding: 0.3rem 0.8rem;
            border-radius: 8px;
            font-size: 0.7rem;
            font-weight: 900;
            text-transform: uppercase;
        }

        /* Footer Button */
        .footer-actions {
            padding: 1.5rem;
            padding-bottom: calc(2rem + env(safe-area-inset-top));
            background: linear-gradient(to top, var(--bg-dark) 70%, transparent 100%);
            position: sticky;
            bottom: 0;
            width: 100%;
        }

        .btn-continue {
            width: 100%;
            height: 64px;
            background: var(--accent-purple);
            color: #fff;
            border: none;
            border-radius: 18px;
            font-size: 1.15rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            transition: 0.2s;
            cursor: pointer;
        }

        .btn-continue:active { transform: scale(0.97); }

    </style>
</head>

<body>
    <div class="top-blob"></div>

    <header class="header">
        <a href="../../home.html" class="back-btn">
            <i class="fa-solid fa-arrow-left-long"></i>
        </a>
    </header>

    <div class="container">
        <h1 class="hero-title">Pricing Plan</h1>
        <p class="hero-sub">Choose the premium experience that fits your needs</p>

        <div class="plan-list">
            <!-- Basic Plan -->
            <div class="plan-item" onclick="selectPlan(this, 'Lite Member', '200', 'Basic Web - Fully Ad-Free')">
                <div class="item-left">
                    <p class="item-title">Lite Member</p>
                    <p class="item-sub">Web Only - Fully Ad-Free</p>
                </div>
                <div class="item-right">
                    <span class="price-val">LKR 200</span>
                    <span class="price-term">/mo</span>
                </div>
            </div>

            <!-- Supreme Plan (Selected by default) -->
            <div class="plan-item active" onclick="selectPlan(this, 'Supreme Member', '300', 'Full Web + App - Fully Ad-Free')">
                <span class="badge-save">Most Popular</span>
                <div class="item-left">
                    <p class="item-title">Supreme Member</p>
                    <p class="item-sub">Web + App - Fully Ad-Free</p>
                </div>
                <div class="item-right">
                    <span class="price-val">LKR 300</span>
                    <span class="price-term">/mo</span>
                </div>
            </div>

            <!-- Family Plan -->
            <div class="plan-item" onclick="selectPlan(this, 'Family Ultimate', '500', 'Ex 2 TV Series & 2 Movies Request')">
                <div class="item-left">
                    <p class="item-title">Family Ultimate</p>
                    <p class="item-sub">Ex 2 TV Series & 2 Movies Request</p>
                </div>
                <div class="item-right">
                    <span class="price-val">LKR 500</span>
                    <span class="price-term">/mo</span>
                </div>
            </div>
        </div>
    </div>

    <div class="footer-actions">
        <button class="btn-continue" onclick="startCheckout()">
            Continue <i class="fa-solid fa-chevron-right"></i>
        </button>
    </div>

    <script>
        let selectedPlan = {
            name: 'Supreme Member',
            price: '300',
            desc: 'Full Web + App Access'
        };

        function selectPlan(el, name, price, desc) {
            document.querySelectorAll('.plan-item').forEach(p => p.classList.remove('active'));
            el.classList.add('active');
            selectedPlan = { name, price, desc };
        }

        function startCheckout() {
            // Store selected plan in session storage for payment.html
            sessionStorage.setItem('selectedPlan', JSON.stringify(selectedPlan));
            window.location.href = 'payment.html';
        }

        // Apply theme color
        document.addEventListener('DOMContentLoaded', () => {
            if (window.AniShiftTheme) {
                const color = window.AniShiftTheme.getColor();
                document.documentElement.style.setProperty('--accent-purple', color);
                
                // Update top blob gradient
                const blob = document.querySelector('.top-blob');
                blob.style.background = `linear-gradient(135deg, ${color} 0%, #1e1e2e 100%)`;
            }
        });

        // Capacitor Back Button
        document.addEventListener('DOMContentLoaded', () => {
            if (window.Capacitor && window.Capacitor.Plugins.App) {
                const App = window.Capacitor.Plugins.App;
                App.addListener('backButton', ({ canGoBack }) => {
                    if (canGoBack) window.history.back();
                    else App.exitApp();
                });
            }
        });
    </script>
</body>

</html>
