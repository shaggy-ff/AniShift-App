<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Edit Profile - AniShift</title>
    <script src="../../../theme.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    
    <!-- Cropper.js -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

    <style>
        :root {
            --bg-main: #0a0b10;
            --bg-card: #11121a;
            --accent-color: #1e90ff;
            --text-light: #ffffff;
            --text-muted: #9ca3af;
            --input-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --nav-bg: rgba(10, 11, 16, 0.8);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-light);
            min-height: 100dvh;
            display: block;
            position: relative;
            transition: background 0.4s ease;
        }

        /* Navbar */
        .navbar {
            position: sticky;
            top: 0;
            width: 100%;
            padding: 1.25rem;
            padding-top: calc(1.25rem + env(safe-area-inset-top));
            background: var(--nav-bg);
            backdrop-filter: blur(15px);
            z-index: 1000;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
        }

        html.light-theme .navbar {
            background: rgba(255, 255, 255, 0.8);
        }

        .nav-back {
            width: 2.5rem;
            height: 2.5rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-light);
            text-decoration: none;
            font-size: 1.1rem;
            margin-right: 1.25rem;
        }

        .nav-title {
            font-size: 1.1rem;
            font-weight: 900;
            letter-spacing: -0.02rem;
        }

        .container {
            padding: 2.5rem 1.5rem;
            max-width: 600px;
            margin: 0 auto;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .avatar-section {
            display: flex;
            justify-content: center;
            margin-bottom: 3.5rem;
        }

        .avatar-container {
            position: relative;
            width: 140px;
            height: 140px;
        }

        .avatar-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--accent-color);
            padding: 5px;
            background: var(--bg-main);
        }

        .edit-badge {
            position: absolute;
            bottom: 5px;
            right: 5px;
            width: 40px;
            height: 40px;
            background: var(--accent-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #000;
            font-size: 1.1rem;
            border: 5px solid var(--bg-main);
            cursor: pointer;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05rem;
            margin-bottom: 0.75rem;
            padding-left: 0.5rem;
        }

        .input-wrapper {
            background: var(--input-bg);
            border: 1px solid var(--glass-border);
            border-radius: 1.25rem;
            padding: 1.25rem 1.5rem;
            transition: 0.3s;
        }

        .input-wrapper:focus-within {
            border-color: var(--accent-color);
            background: rgba(var(--accent-rgb, 30,144,255), 0.06);
        }

        .input-wrapper input {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-light);
            font-size: 1rem;
            font-weight: 700;
            outline: none;
        }

        .save-btn {
            width: 100%;
            background: var(--accent-color);
            color: #000;
            border: none;
            padding: 1.35rem;
            border-radius: 1.25rem;
            font-size: 1rem;
            font-weight: 900;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 2rem;
            text-transform: uppercase;
            letter-spacing: 0.03rem;
        }

        .save-btn:active {
            transform: scale(0.96);
        }

        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(10, 11, 16, 0.85);
            backdrop-filter: blur(8px);
            z-index: 5000;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Crop Modal Styles */
        .crop-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.98);
            z-index: 6000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .crop-container {
            width: 100%;
            max-width: 450px;
            aspect-ratio: 1;
            background: #000;
            border-radius: 1.5rem;
            overflow: hidden;
            margin-bottom: 2.5rem;
        }

        .crop-btns {
            display: flex;
            gap: 1rem;
            width: 100%;
            max-width: 450px;
        }

        .btn-crop-action {
            flex: 1;
            padding: 1.2rem;
            border-radius: 1.25rem;
            border: none;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-crop-cancel { background: rgba(255,255,255,0.05); color: #fff; }
        .btn-crop-save { background: var(--accent-color); color: #000; }
    </style>
</head>

<body>
    <div class="navbar">
        <a href="../../home.html#profile" class="nav-back">
            <i class="fa-solid fa-angle-left"></i>
        </a>
        <span class="nav-title">Edit Profile</span>
    </div>

    <div class="container">
        <div class="avatar-section">
            <div class="avatar-container">
                <img id="avatarPreview" src="../../images/guest_avatar.png" class="avatar-img" alt="Avatar">
                <div class="edit-badge" onclick="document.getElementById('pfpInput').click()">
                    <i class="fa-solid fa-pencil"></i>
                </div>
            </div>
            <input type="file" id="pfpInput" hidden accept="image/*">
        </div>

        <div class="input-group">
            <label>Display Name</label>
            <div class="input-wrapper">
                <input type="text" id="displayName" placeholder="Enter your name">
            </div>
        </div>

        <button class="save-btn" id="saveBtn" onclick="saveProfile()">Save Changes</button>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
    </div>

    <!-- Crop Modal -->
    <div id="cropModal" class="crop-modal-overlay">
        <div class="crop-container">
            <img id="cropTarget" src="">
        </div>
        <div class="crop-btns">
            <button class="btn-crop-action btn-crop-cancel" onclick="closeCropModal()">Cancel</button>
            <button class="btn-crop-action btn-crop-save" onclick="saveCrop()">Crop & Save</button>
        </div>
    </div>

    <script>
        const authConfig = {
            apiKey: "AIzaSyDjSDssOvzvZEOZd1HE-SNGCyZbTp1gsIs",
            authDomain: "anishift-5d14b.firebaseapp.com",
            databaseURL: "https://anishift-5d14b-default-rtdb.firebaseio.com",
            projectId: "anishift-5d14b",
            storageBucket: "anishift-5d14b.firebasestorage.app",
            messagingSenderId: "390267133940",
            appId: "1:390267133940:web:a735ebcab0c60295bc23a1"
        };
        firebase.initializeApp(authConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let cropper;
        const avatarPreview = document.getElementById('avatarPreview');
        const pfpInput = document.getElementById('pfpInput');
        const cropModal = document.getElementById('cropModal');
        const cropTarget = document.getElementById('cropTarget');
        const loadingOverlay = document.getElementById('loadingOverlay');

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('displayName').value = user.displayName || "";
                if (user.photoURL) avatarPreview.src = user.photoURL;
                else avatarPreview.src = "../../images/guest_avatar.png";
            } else {
                // Check localStorage for guests
                const userData = JSON.parse(localStorage.getItem('userData') || '{}');
                document.getElementById('displayName').value = userData.name || "Guest Pilot";
                avatarPreview.src = userData.avatar || "../../images/guest_avatar.png";
            }
        });

        pfpInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    cropTarget.src = event.target.result;
                    openCropModal();
                };
                reader.readAsDataURL(file);
            }
        };

        function openCropModal() {
            cropModal.style.display = 'flex';
            if (cropper) cropper.destroy();
            setTimeout(() => {
                cropper = new Cropper(cropTarget, {
                    aspectRatio: 1,
                    viewMode: 2,
                    guides: false,
                    autoCropArea: 1,
                });
            }, 300);
        }

        function closeCropModal() {
            cropModal.style.display = 'none';
            if (cropper) cropper.destroy();
            pfpInput.value = "";
        }

        async function saveCrop() {
            loadingOverlay.style.display = 'flex';
            const canvas = cropper.getCroppedCanvas({ width: 300, height: 300 });
            canvas.toBlob(async (blob) => {
                const formData = new FormData();
                formData.append('image', blob);

                try {
                    const res = await fetch('https://api.imgbb.com/1/upload?key=609e6c2fbfb18e2fb9c18f31428ad8b9', {
                        method: 'POST',
                        body: formData
                    });
                    const result = await res.json();

                    if (result.success) {
                        const newUrl = result.data.url;
                        const user = auth.currentUser;
                        
                        if (user) {
                            await user.updateProfile({ photoURL: newUrl });
                            await db.collection('users').doc(user.uid).set({ avatar: newUrl }, { merge: true });
                        }
                        
                        // Update UI & LocalStorage
                        avatarPreview.src = newUrl;
                        const userData = JSON.parse(localStorage.getItem('userData')) || {};
                        userData.avatar = newUrl;
                        localStorage.setItem('userData', JSON.stringify(userData));

                        closeCropModal();
                    }
                } catch (e) {
                    console.error(e);
                    alert("Upload failed. Try again.");
                } finally {
                    loadingOverlay.style.display = 'none';
                }
            }, 'image/jpeg', 0.85);
        }

        async function saveProfile() {
            const name = document.getElementById('displayName').value;
            if (!name) return alert("Please enter a name");

            loadingOverlay.style.display = 'flex';
            try {
                const user = auth.currentUser;
                if (user) {
                    await user.updateProfile({ displayName: name });
                    await db.collection('users').doc(user.uid).set({ name: name }, { merge: true });
                }
                
                // Update LocalStorage
                const userData = JSON.parse(localStorage.getItem('userData')) || {};
                userData.name = name;
                localStorage.setItem('userData', JSON.stringify(userData));

                alert("Profile updated successfully!");
                window.location.href = '../../home.html#profile';
            } catch (e) {
                console.error(e);
                alert("Update failed. Try again.");
            } finally {
                loadingOverlay.style.display = 'none';
            }
        }
    </script>
    <script>
        // Phone Back Button Fix
        document.addEventListener('DOMContentLoaded', () => {
            if (window.Capacitor && window.Capacitor.Plugins.App) {
                const App = window.Capacitor.Plugins.App;
                App.addListener('backButton', ({ canGoBack }) => {
                    if (canGoBack) {
                        window.history.back();
                    } else {
                        App.exitApp();
                    }
                });
            }
        });
    </script>
</body>

</html>
