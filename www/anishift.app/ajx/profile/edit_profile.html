<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Edit Profile - AniShift</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-main: #0a0b10;
            --bg-secondary: #14151e;
            --accent-color: #1e90ff;
            --text-light: #ffffff;
            --text-muted: #9ca3af;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        html {
            background-color: #000;
            font-size: clamp(14px, 4.2vw, 18px);
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-light);
            width: 100%;
            margin: 0;
            min-height: 100dvh;
            position: relative;
            overflow-x: hidden;
            padding-bottom: 5rem;
        }

        /* Nav Overlay matching Details page */
        .nav-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 1.25rem;
            padding-top: calc(1.25rem + env(safe-area-inset-top));
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .nav-btn {
            width: 2.75rem;
            height: 2.75rem;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            text-decoration: none;
            transition: 0.3s;
        }

        .nav-btn:active { transform: scale(0.9); }

        /* Hero Header */
        .hero-edit {
            height: 16rem;
            background: linear-gradient(to bottom, rgba(30, 144, 255, 0.15), var(--bg-main)), 
                        url('https://wallpapers.com/images/featured/anime-scenery-background-5v0p9kvy2p3tqy0e.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding-bottom: 2rem;
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        .avatar-edit-container {
            position: relative;
            margin-bottom: 1rem;
            animation: float 3s ease-in-out infinite;
        }

        .avatar-preview {
            width: 6.5rem;
            height: 6.5rem;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--accent-color);
            box-shadow: 0 0 20px rgba(30, 144, 255, 0.3);
        }

        .edit-camera-icon {
            position: absolute;
            bottom: 0.2rem;
            right: 0.2rem;
            background: var(--accent-color);
            color: #000;
            width: 2rem;
            height: 2rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            border: 2px solid var(--bg-main);
        }

        /* Form Content */
        .form-content {
            padding: 2rem 1.25rem;
        }

        .section-h {
            font-size: 1rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05rem;
            margin-bottom: 2rem;
            color: #fff;
            opacity: 0;
            animation: fadeInUp 0.6s ease-out forwards;
        }

        .section-h::before {
            content: '';
            width: 0.25rem;
            height: 1.25rem;
            background: var(--accent-color);
            border-radius: 0.2rem;
        }

        .input-group {
            margin-bottom: 1.8rem;
            opacity: 0;
            transform: translateY(15px);
            animation: fadeInUp 0.5s ease-out forwards;
        }

        .input-group:nth-child(2) { animation-delay: 0.1s; }
        .input-group:nth-child(3) { animation-delay: 0.2s; }
        .input-group:nth-child(4) { animation-delay: 0.3s; }

        .input-group label {
            display: block;
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05rem;
            margin-bottom: 0.75rem;
        }

        .input-group input, .input-group textarea {
            width: 100%;
            background: #11121a;
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 1rem 1.25rem;
            border-radius: 1rem;
            color: #fff;
            font-size: 0.9rem;
            outline: none;
            transition: 0.3s;
        }

        .input-group input:focus, .input-group textarea:focus {
            border-color: var(--accent-color);
            background: #181a25;
            box-shadow: 0 0 15px rgba(30, 144, 255, 0.1);
        }

        .save-btn {
            width: 100%;
            margin-top: 2rem;
            padding: 1.1rem;
            background: var(--accent-color);
            color: #000;
            border: none;
            border-radius: 3rem;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(30, 144, 255, 0.3);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            animation: fadeInUp 0.6s ease-out forwards 0.4s;
        }

        .save-btn:active { transform: scale(0.96); }

        /* Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
    </style>
</head>

<body>
    <div class="nav-overlay">
        <a href="../../home.html#profile" class="nav-btn"><i class="fa-solid fa-chevron-left"></i></a>
    </div>

    <div class="hero-edit">
        <div class="avatar-edit-container">
            <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?q=80&w=254&auto=format&fit=crop"
                id="avatarPreview" class="avatar-preview" alt="Avatar">
            <div class="edit-camera-icon"><i class="fa-solid fa-camera"></i></div>
        </div>
        <h1 style="font-size: 1.5rem; font-weight: 900;">Edit Profile</h1>
    </div>

    <div class="form-content">
        <h2 class="section-h">Public Profile</h2>
        
        <div class="input-group">
            <label>Full Name</label>
            <input type="text" id="userName" placeholder="Your name">
        </div>

        <div class="input-group">
            <label>Avatar URL</label>
            <input type="text" id="avatarUrl" placeholder="https://..." oninput="document.getElementById('avatarPreview').src = this.value">
        </div>

        <div class="input-group">
            <label>Bio / About Me</label>
            <textarea id="userBio" rows="4" placeholder="Tell us something about yourself..."></textarea>
        </div>

        <button class="save-btn" onclick="saveProfile()">Save Changes</button>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const userData = JSON.parse(localStorage.getItem('userData'));
            if (userData) {
                if (userData.name) document.getElementById('userName').value = userData.name;
                if (userData.avatar) {
                    document.getElementById('avatarUrl').value = userData.avatar;
                    document.getElementById('avatarPreview').src = userData.avatar;
                }
                if (userData.bio) document.getElementById('userBio').value = userData.bio;
            }
        });

        function saveProfile() {
            const name = document.getElementById('userName').value;
            const avatar = document.getElementById('avatarUrl').value;
            const bio = document.getElementById('userBio').value;

            const userData = { name, avatar, bio };
            localStorage.setItem('userData', JSON.stringify(userData));
            
            alert('Profile updated successfully!');
            window.location.href = '../../profile.html';
        }
    </script>
    <script src="../../../anishift_ads.js"></script>
</body>
</html>
