<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>My Watchlist - AniShift</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-main: #0a0b10;
            --bg-secondary: #14151e;
            --accent-color: #1e90ff;
            --text-light: #ffffff;
            --text-muted: #9ca3af;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        html {
            background-color: #000;
            font-size: clamp(14px, 4.2vw, 18px);
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-light);
            width: 100%;
            margin: 0;
            min-height: 100dvh;
            position: relative;
            overflow-x: hidden;
            padding-bottom: 5rem;
        }

        /* Nav Overlay */
        .nav-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 1.25rem;
            padding-top: calc(1.25rem + env(safe-area-inset-top));
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .nav-btn {
            width: 2.75rem;
            height: 2.75rem;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            text-decoration: none;
            transition: 0.3s;
        }

        .nav-btn:active { transform: scale(0.9); }

        /* Hero */
        .hero-watchlist {
            height: 16rem;
            background: linear-gradient(to bottom, rgba(30, 144, 255, 0.15), var(--bg-main)), 
                        url('https://wallpapers.com/images/featured/anime-scenery-background-5v0p9kvy2p3tqy0e.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            padding-bottom: 2rem;
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        .bookmark-icon-box {
            width: 4.2rem;
            height: 4.2rem;
            background: rgba(30, 144, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(30, 144, 255, 0.3);
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1rem;
            animation: float 3s ease-in-out infinite;
        }

        .bookmark-icon-box i {
            font-size: 1.8rem;
            color: var(--accent-color);
            filter: drop-shadow(0 0 10px var(--accent-color));
        }

        .hero-watchlist h1 {
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: -0.02rem;
        }

        /* Content */
        .content {
            padding: 1.8rem 1.25rem;
        }

        .section-h {
            font-size: 1.1rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05rem;
            margin-bottom: 1.5rem;
            color: #fff;
            opacity: 0;
            animation: fadeInUp 0.6s ease-out forwards;
        }

        .section-h::before {
            content: '';
            width: 0.25rem;
            height: 1.25rem;
            background: var(--accent-color);
            border-radius: 0.2rem;
        }

        .watchlist-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.75rem;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out forwards 0.2s;
        }

        /* Card Vibe from Details/Home */
        .rec-card {
            width: 100%;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .rec-img-box {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1.4;
            border-radius: 0.5rem;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            background: #11121a;
        }

        .rec-img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.5s;
        }

        .rec-tag-hd {
            position: absolute;
            top: 0.4rem;
            left: 0.4rem;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(5px);
            color: #fff;
            font-size: 0.55rem;
            padding: 0.1rem 0.35rem;
            border-radius: 2px;
            font-weight: 900;
            z-index: 5;
        }

        .ep-tag {
            position: absolute;
            bottom: 0.5rem;
            left: 0.4rem;
            background: #2196F3;
            color: #fff;
            font-size: 0.62rem;
            padding: 0.18rem 0.35rem;
            border-radius: 0.375rem;
            z-index: 10;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            line-height: 1;
        }

        .cc-icon {
            background: #fff;
            color: #2196F3;
            font-size: 0.42rem;
            font-weight: 900;
            padding: 0.1rem 0.15rem;
            border-radius: 0.15rem;
            text-transform: lowercase;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        .remove-overlay-btn {
            position: absolute;
            top: 0.4rem;
            right: 0.4rem;
            width: 1.7rem;
            height: 1.7rem;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            cursor: pointer;
            z-index: 10;
            font-size: 0.8rem;
            transition: 0.2s;
        }

        .remove-overlay-btn:active { transform: scale(0.85); background: rgba(255, 0, 0, 0.3); }

        .rec-title {
            font-size: 0.75rem;
            font-weight: 700;
            color: #fff;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.3;
            padding: 0 0.2rem;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 6rem 2rem;
            opacity: 0;
            animation: fadeIn 1s forwards;
        }

        .empty-state i {
            font-size: 3.5rem;
            color: var(--accent-color);
            opacity: 0.2;
            margin-bottom: 2rem;
        }

        .browse-now-btn {
            display: inline-block;
            margin-top: 1.5rem;
            padding: 0.8rem 1.8rem;
            background: var(--accent-color);
            color: #000;
            border-radius: 2rem;
            text-decoration: none;
            font-weight: 800;
            font-size: 0.85rem;
            box-shadow: 0 4px 15px rgba(30, 144, 255, 0.3);
        }

        /* Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>

<body>
    <div class="nav-overlay">
        <a href="../../home.html#profile" class="nav-btn"><i class="fa-solid fa-chevron-left"></i></a>
    </div>

    <div class="hero-watchlist">
        <div class="bookmark-icon-box">
            <i class="fa-solid fa-bookmark"></i>
        </div>
        <h1>My Watchlist</h1>
        <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 0.4rem; font-weight: 600;">Saved favorites on this device</p>
    </div>

    <div class="content">
        <h2 id="listTitle" class="section-h">Your Collection</h2>
        <div id="watchlistGrid" class="watchlist-grid">
            <!-- Dynamic items -->
        </div>
        <div id="emptyState" class="empty-state" style="display: none;">
            <i class="fa-solid fa-cloud-moon"></i>
            <h3 style="font-size: 1.2rem; font-weight: 800;">Your list is empty</h3>
            <p style="font-size: 0.85rem; color: var(--text-muted); margin-top: 0.5rem; line-height: 1.6;">
                Save some anime titles to your collection and they will appear here.
            </p>
            <a href="../../home.html" class="browse-now-btn">Go Browsing</a>
        </div>
    </div>

    <script>
        function renderWatchlist() {
            const grid = document.getElementById('watchlistGrid');
            const empty = document.getElementById('emptyState');
            const title = document.getElementById('listTitle');
            const myList = JSON.parse(localStorage.getItem('myList') || '[]');

            if (myList.length === 0) {
                grid.innerHTML = '';
                empty.style.display = 'block';
                title.style.display = 'none';
                return;
            }

            empty.style.display = 'none';
            title.style.display = 'flex';
            grid.innerHTML = '';
            
            myList.forEach(item => {
                const card = document.createElement('div');
                card.style.position = 'relative';
                const epDisplay = item.ep ? item.ep.toString().replace('Ep ', '') : '?';
                card.innerHTML = `
                    <a href="../c.w.d/details.html?id=${item.id}" class="rec-card">
                        <div class="rec-img-box">
                            <span class="rec-tag-hd">${item.type || 'TV'}</span>
                            <div class="ep-tag"><span class="cc-icon">cc</span> ${epDisplay}</div>
                            <img src="${item.img}" alt="${item.title}">
                        </div>
                        <div class="rec-title">${item.title}</div>
                    </a>
                    <div class="remove-overlay-btn" onclick="removeFromList(${item.id})">
                        <i class="fa-solid fa-xmark"></i>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function removeFromList(id) {
            let myList = JSON.parse(localStorage.getItem('myList') || '[]');
            myList = myList.filter(a => a.id !== id);
            localStorage.setItem('myList', JSON.stringify(myList));
            renderWatchlist();
        }

        document.addEventListener('DOMContentLoaded', renderWatchlist);
    </script>
    <script src="../../../anishift_ads.js"></script>
    <script>
        // Phone Back Button Fix
        document.addEventListener('DOMContentLoaded', () => {
            if (window.Capacitor && window.Capacitor.Plugins.App) {
                const App = window.Capacitor.Plugins.App;
                App.addListener('backButton', ({ canGoBack }) => {
                    if (canGoBack) {
                        window.history.back(); // කලින් පිටුවක් තියෙනවා නම් ඒකට යන්න
                    } else {
                        App.exitApp(); // මුල්ම පිටුවේ ඉන්නවා නම් විතරක් ඇප් එකෙන් එළියට යන්න
                    }
                });
            }
        });
    </script>
</body>
</html>
